# AirSLAM visual-inertial odometry config for Rosario v2 dataset.
# Images: 1280x720 (rectified ZED IR images).
#
# Derived from upstream configs/visual_odometry/vo_euroc.yaml with
# point_matcher image dimensions adjusted to 1280x720 and a unique
# engine_file name to avoid TensorRT cache conflicts between datasets.
#
# NOTE: On first run for this dataset, TensorRT will rebuild the engine
# for 1280x720 inputs (~5-10 min). Subsequent runs reuse the cached engine.

plnet:
  use_superpoint: 1
  max_keypoints: 400
  keypoint_threshold: 0.004
  remove_borders: 4
  line_threshold: 0.75
  line_length_threshold: 50

point_matcher:
  matcher: 0               # 0 for LightGlue, 1 for SuperGlue
  image_width: 1280
  image_height: 720
  onnx_file: "superpoint_lightglue.onnx"
  engine_file: "superpoint_lightglue_rosariov2.engine"

keyframe:
  min_init_stereo_feature: 90
  lost_num_match: 10
  min_num_match: 30
  max_num_match: 80
  tracking_point_rate: 0.65
  tracking_parallax_rate: 0.1

optimization:
  tracking:
    mono_point: 50
    stereo_point: 75
    mono_line: 50
    stereo_line: 75
    rate: 0.5
  backend:
    mono_point: 50
    stereo_point: 75
    mono_line: 50
    stereo_line: 75
    rate: 0.5

ros_publisher:
  feature: 1
  feature_topic: "/AirSLAM/feature"
  frame_pose: 1
  frame_pose_topic: "/AirSLAM/frame_pose"
  frame_odometry_topic: "/AirSLAM/LatestOdometry"
  keyframe: 1
  keyframe_topic: "/AirSLAM/keyframe"
  path_topic: "/AirSLAM/odometry"
  map: 1
  map_topic: "/AirSLAM/map"
  mapline: 1
  mapline_topic: "/AirSLAM/mapline"
  reloc: 0
  reloc_topic: "/AirSLAM/reloc"
