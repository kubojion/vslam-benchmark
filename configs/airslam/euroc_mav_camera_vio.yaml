%YAML:1.0
# AirSLAM camera calibration for the EuRoC-MAV dataset.
#
# Source: official AirSLAM EuRoC config (src/airslam/configs/camera/euroc.yaml)
# with use_imu set to 0 for vision-only mode (no IMU).
#
# Images are raw (distorted) 752x480 grayscale frames from mav0/cam0/data/ and
# mav0/cam1/data/. AirSLAM performs stereo rectification internally via
# distortion_type: 1 (radial-tangential / radtan).
#
# Intrinsics and distortion from EuRoC sensor.yaml.
# T_BS (body -> sensor) matrices taken directly from sensor.yaml;
# T_type: 0 = EuRoC convention (T is T_bc = body -> camera).

image_height: 480
image_width:  752
use_imu: 1

depth_lower_thr: 0.1
depth_upper_thr: 10.0
max_y_diff: 1

# Calibration
distortion_type: 1   # 1 = radtan [k1, k2, p1, p2, k3]

cam0:
  intrinsics: [458.654, 457.296, 367.215, 248.375]
  distortion_coeffs: [-0.28340811, 0.07395907, 0.00019359, 1.76187114e-05, 0.0]
  T_type: 0    # EuRoC format: T is T_bc (body -> camera)
  T:
  - [ 0.0148655429818, -0.999880929698,  0.00414029679422, -0.0216401454975]
  - [ 0.999557249008,   0.0149672133247, 0.025715529948,   -0.064676986768 ]
  - [-0.0257744366974,  0.00375618835797, 0.999660727178,   0.00981073058949]
  - [ 0.0,              0.0,              0.0,              1.0             ]

cam1:
  intrinsics: [457.587, 456.134, 379.999, 255.238]
  distortion_coeffs: [-0.28368365, 0.07451284, -0.00010473, -3.55590700e-05, 0.0]
  T_type: 0
  T:
  - [ 0.0125552670891, -0.999755099723,  0.0182237714554, -0.0198435579556]
  - [ 0.999598781151,   0.0130119051815, 0.0251588363115,  0.0453689425024]
  - [-0.0253898008918,  0.0179005838253, 0.999517347078,   0.00786212447038]
  - [ 0.0,              0.0,             0.0,              1.0             ]

# IMU (EuRoC ASL dataset: Pixhawk IMU / ADIS16448, 200 Hz)
# Noise from AirSLAM upstream euroc.yaml in src/airslam/configs/camera/euroc.yaml
rate_hz: 200
gyroscope_noise_density:     1.6968e-04   # rad/s/sqrt(Hz)
gyroscope_random_walk:       1.9393e-05   # rad/s^2/sqrt(Hz)
accelerometer_noise_density: 2.0000e-03   # m/s^2/sqrt(Hz)
accelerometer_random_walk:   3.0000e-03   # m/s^3/sqrt(Hz)
g_value: 9.81007
