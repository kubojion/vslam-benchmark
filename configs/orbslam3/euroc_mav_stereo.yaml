%YAML:1.0
# ORB-SLAM3 stereo configuration for EuRoC-MAV dataset.
#
# Calibration taken directly from the official ORB-SLAM3 EuRoC example config
# (Examples/Stereo/EuRoC.yaml) which uses the published EuRoC sensor.yaml
# intrinsics/distortion and the inter-camera extrinsic from the dataset.
#
# Camera.type "PinHole": ORB-SLAM3 handles radtan undistortion internally.
# Images are the raw 752x480 grayscale frames from mav0/cam0/data/ and
# mav0/cam1/data/ (no pre-rectification needed).
#
# Used for the EuRoC-MAV sanity check (MH_01_easy, single run).

File.version: "1.0"

#--------------------------------------------------------------------------------------------
# Camera Parameters
#--------------------------------------------------------------------------------------------

Camera.type: "PinHole"

# Left camera intrinsics and radtan distortion (from EuRoC sensor.yaml cam0)
Camera1.fx: 458.654
Camera1.fy: 457.296
Camera1.cx: 367.215
Camera1.cy: 248.375

Camera1.k1: -0.28340811
Camera1.k2:  0.07395907
Camera1.p1:  0.00019359
Camera1.p2:  1.76187114e-05

# Right camera intrinsics and radtan distortion (from EuRoC sensor.yaml cam1)
Camera2.fx: 457.587
Camera2.fy: 456.134
Camera2.cx: 379.999
Camera2.cy: 255.238

Camera2.k1: -0.28368365
Camera2.k2:  0.07451284
Camera2.p1: -0.00010473
Camera2.p2: -3.55590700e-05

Camera.width:  752
Camera.height: 480

Camera.fps: 20

# 0 = grayscale
Camera.RGB: 1

#--------------------------------------------------------------------------------------------
# Stereo Parameters
#--------------------------------------------------------------------------------------------

Stereo.ThDepth: 60.0

# T_c1_c2: pose of right camera (cam1) in left camera (cam0) frame.
# Source: official ORB-SLAM3 EuRoC.yaml.
Stereo.T_c1_c2: !!opencv-matrix
  rows: 4
  cols: 4
  dt: f
  data: [ 0.999997256477797,-0.002317135723275,-0.000343393120620, 0.110074137800478,
          0.002312067192432, 0.999898048507103,-0.014090668452683,-0.000156612054392,
          0.000376008102320, 0.014089835846691, 0.999900662638081, 0.000889382785432,
          0.0,               0.0,               0.0,               1.0              ]

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------

ORBextractor.nFeatures:   1200
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels:     8
ORBextractor.iniThFAST:   20
ORBextractor.minThFAST:   7

#--------------------------------------------------------------------------------------------
# Viewer (disabled in headless runs via system env; kept for completeness)
#--------------------------------------------------------------------------------------------

Viewer.KeyFrameSize:      0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth:    0.9
Viewer.PointSize:         2.0
Viewer.CameraSize:        0.08
Viewer.CameraLineWidth:   3.0
Viewer.ViewpointX:        0.0
Viewer.ViewpointY:       -0.7
Viewer.ViewpointZ:       -1.8
Viewer.ViewpointF:        500.0
Viewer.imageViewScale:    1.0
