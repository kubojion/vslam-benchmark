%YAML:1.0
# ORB-SLAM3 stereo-inertial (VIO) configuration for Rosario v2.
#
# Loop closure ENABLED (loopClosing: 1). For VIO without LC see
# rosariov2_stereo_inertial_lc.yaml.
#
# Camera intrinsics + rectification matrices: identical to rosariov2_stereo.yaml
# (taken from https://github.com/CIFASIS/rosariov2/blob/main/evaluation/
#  orb-slam3_rosariov2.yaml).
#
# IMU intrinsics + Tbc: taken verbatim from the same CIFASIS evaluation config.

File.version: "1.0"

#--------------------------------------------------------------------------------------------
# Camera Parameters (rectified, see rosariov2_stereo.yaml for derivation)
#--------------------------------------------------------------------------------------------
Camera.type: "Rectified"

Camera1.fx: 648.8624169653789
Camera1.fy: 648.8624169653789
Camera1.cx: 645.0113372802734
Camera1.cy: 348.24266815185547

Camera.RGB: 0
Camera.fps: 15
Camera.width:  1280
Camera.height: 720

Stereo.b: 0.0497336941
Stereo.ThDepth: 80.0

#--------------------------------------------------------------------------------------------
# Stereo Rectification matrices (Kalibr, do_rectify=false)
#--------------------------------------------------------------------------------------------
LEFT.height: 720
