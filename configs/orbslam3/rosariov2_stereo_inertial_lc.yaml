#--------------------------------------------------------------------------------------------
# IMU
#--------------------------------------------------------------------------------------------
# Transformation from camera 0 to body-frame (imu).
# Note: ORB-SLAM3 (Settings.cc, Rectified branch) reads `IMU.T_b_c1`; values are
# the CIFASIS Tbc 4x4 matrix.
IMU.T_b_c1: !!opencv-matrix
  rows: 4
  cols: 4
  dt: f
  data: [ 0.999992, -0.003898, -0.000576, -0.004483,
          0.003895,  0.999979, -0.005012,  0.019179,
          0.000596,  0.005009,  0.999987,  0.027584,
          0.000000,  0.000000,  0.000000,  1.000000]

# IMU noise (RealSense D435i, identified by CIFASIS).
IMU.NoiseGyro: 2.324e-04
IMU.NoiseAcc:  9.943e-04
IMU.GyroWalk:  1.823e-06
IMU.AccWalk:   4.750e-05
IMU.Frequency: 200.0
IMU.InsertKFsWhenLost: 1

#--------------------------------------------------------------------------------------------
# ORB Extractor
#--------------------------------------------------------------------------------------------
ORBextractor.nFeatures:   1200
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels:     8
ORBextractor.iniThFAST:   20
ORBextractor.minThFAST:   7

#--------------------------------------------------------------------------------------------
# System
#--------------------------------------------------------------------------------------------
# VIO + loop closure enabled (Stereo-Inertial SLAM with LC).
loopClosing: 1

#--------------------------------------------------------------------------------------------
# Viewer
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize:      0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth:    0.9
Viewer.PointSize:         2.0
Viewer.CameraSize:        0.08
Viewer.CameraLineWidth:   3.0
Viewer.ViewpointX:        0.0
Viewer.ViewpointY:       -0.7
Viewer.ViewpointZ:       -1.8
Viewer.ViewpointF:        500.0
Viewer.imageViewScale:    1.0
Viewer.bUseViewer:        0
