%YAML:1.0
# ORB-SLAM3 stereo-inertial (VIO) configuration for EuRoC-MAV dataset.
#
# Camera intrinsics + stereo extrinsic: identical to euroc_mav_stereo.yaml,
# taken from the official ORB-SLAM3 EuRoC example configs and the published
# EuRoC sensor.yaml.
#
# IMU (ADIS16448 at 200 Hz): calibration from the official ORB-SLAM3
# Examples/Stereo-Inertial/EuRoC.yaml and the EuRoC body.yaml.
#
# Loop closure DISABLED (loopClosing: 0) -> VIO bucket.

File.version: "1.0"

#--------------------------------------------------------------------------------------------
# Camera Parameters
#--------------------------------------------------------------------------------------------

Camera.type: "PinHole"

# Left camera intrinsics and radtan distortion (EuRoC sensor.yaml cam0)
Camera1.fx: 458.654
Camera1.fy: 457.296
Camera1.cx: 367.215
Camera1.cy: 248.375

Camera1.k1: -0.28340811
Camera1.k2:  0.07395907
Camera1.p1:  0.00019359
Camera1.p2:  1.76187114e-05

# Right camera intrinsics and radtan distortion (EuRoC sensor.yaml cam1)
Camera2.fx: 457.587
Camera2.fy: 456.134
Camera2.cx: 379.999
Camera2.cy: 255.238

Camera2.k1: -0.28368365
Camera2.k2:  0.07451284
Camera2.p1: -0.00010473
Camera2.p2: -3.55590700e-05

Camera.width:  752
Camera.height: 480

Camera.fps: 20

# 0 = grayscale
Camera.RGB: 1

#--------------------------------------------------------------------------------------------
# Stereo Parameters
#--------------------------------------------------------------------------------------------

Stereo.ThDepth: 60.0

# T_c1_c2: pose of right camera (cam1) in left camera (cam0) frame.
# Source: official ORB-SLAM3 EuRoC.yaml.
Stereo.T_c1_c2: !!opencv-matrix
  rows: 4
  cols: 4
  dt: f
  data: [ 0.999997256477797,-0.002317135723275,-0.000343393120620, 0.110074137800478,
          0.002312067192432, 0.999898048507103,-0.014090668452683,-0.000156612054392,
          0.000376008102320, 0.014089835846691, 0.999900662638081, 0.000889382785432,
          0.0,               0.0,               0.0,               1.0              ]

#--------------------------------------------------------------------------------------------
# IMU
#--------------------------------------------------------------------------------------------
# IMU.T_b_c1: transformation from left camera (cam0) to IMU/body frame.
# Source: EuRoC body.yaml T_BS (cam0) and ORB-SLAM3 Examples/Stereo-Inertial/EuRoC.yaml.
# Convention: T_b_c1 transforms a point from cam0 frame to body/IMU frame.

IMU.T_b_c1: !!opencv-matrix
  rows: 4
  cols: 4
  dt: f
  data: [ 0.0148655429818, -0.999880929698,  0.00414029679422, -0.0216401454975,
          0.999557249008,   0.0149672133247,  0.025715529948,   -0.064676986768,
         -0.0257744366974,  0.00375618835797, 0.999660727178,    0.00981073058949,
          0.0,              0.0,              0.0,               1.0             ]

# IMU noise parameters for ADIS16448 (from EuRoC calibration and ORB-SLAM3 example).
IMU.NoiseGyro: 1.7e-4
IMU.NoiseAcc:  2.0e-3
IMU.GyroWalk:  1.9393e-5
IMU.AccWalk:   3.0000e-3
IMU.Frequency: 200.0
IMU.InsertKFsWhenLost: 1

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------

ORBextractor.nFeatures:   1200
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels:     8
ORBextractor.iniThFAST:   20
ORBextractor.minThFAST:   7

#--------------------------------------------------------------------------------------------
# System
#--------------------------------------------------------------------------------------------

loopClosing: 0

#--------------------------------------------------------------------------------------------
# Viewer
#--------------------------------------------------------------------------------------------

Viewer.KeyFrameSize:      0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth:    0.9
Viewer.PointSize:         2.0
Viewer.CameraSize:        0.08
Viewer.CameraLineWidth:   3.0
Viewer.ViewpointX:        0.0
Viewer.ViewpointY:       -0.7
Viewer.ViewpointZ:       -1.8
Viewer.ViewpointF:        500.0
Viewer.imageViewScale:    1.0
