%YAML:1.0

# OpenVINS estimator config for Rosario v2 (sequence1, sequence5 — ZED stereo IR
# at 15 Hz + integrated IMU at 200 Hz, pre-rectified 1280x720 mono8 images).
#
# Tuning notes vs. upstream euroc_mav config:
#  - calib_cam_extrinsics:false    Rosario uses pre-rectified images and a
#                                  factory-calibrated rigid stereo pair; we trust
#                                  the calibration and do not re-optimise it
#                                  online (saves filter capacity).
#  - calib_cam_intrinsics:false    same reason.
#  - gravity_mag: 9.7958           Cordoba, Argentina (~31°S).
#  - track_frequency: 15.0         camera publishes at 15 Hz.
#  - num_pts: 250                  bumped vs. EuRoC default to compensate for
#                                  sparser-textured outdoor scenes.
#  - histogram_method: HISTOGRAM   keeps default (cheap and robust on IR).

verbosity: "INFO"

use_fej: true
integration: "rk4"
use_stereo: true
max_cameras: 2

calib_cam_extrinsics: false
calib_cam_intrinsics: false
calib_cam_timeoffset: true
calib_imu_intrinsics: false
calib_imu_g_sensitivity: false

max_clones: 11
max_slam: 50
max_slam_in_update: 25
max_msckf_in_update: 40
dt_slam_delay: 1

gravity_mag: 9.7958

feat_rep_msckf: "GLOBAL_3D"
feat_rep_slam: "ANCHORED_MSCKF_INVERSE_DEPTH"
feat_rep_aruco: "ANCHORED_MSCKF_INVERSE_DEPTH"

try_zupt: false
zupt_chi2_multipler: 0
zupt_max_velocity: 0.1
zupt_noise_multiplier: 10
zupt_max_disparity: 0.5
zupt_only_at_beginning: false

# Initialization
init_window_time: 2.0
init_imu_thresh: 1.0       # rosario IMU is fairly clean; lower jerk threshold ok
init_max_disparity: 10.0
init_max_features: 50

init_dyn_use: true
init_dyn_mle_opt_calib: false
init_dyn_mle_max_iter: 50
init_dyn_mle_max_time: 0.05
init_dyn_mle_max_threads: 6
init_dyn_num_pose: 6
init_dyn_min_deg: 10.0

init_dyn_inflation_ori: 10
init_dyn_inflation_vel: 100
init_dyn_inflation_bg: 10
init_dyn_inflation_ba: 100
init_dyn_min_rec_cond: 1e-12

init_dyn_bias_g: [0.0, 0.0, 0.0]
init_dyn_bias_a: [0.0, 0.0, 0.0]

# Output (only used if save_total_state:true and ground-truth simulator is set;
# we capture the trajectory by subscribing to /ov_msckf/odomimu in the player).
record_timing_information: false
record_timing_filepath: "/tmp/traj_timing.txt"

save_total_state: false
filepath_est: "/tmp/ov_estimate.txt"
filepath_std: "/tmp/ov_estimate_std.txt"
filepath_gt: "/tmp/ov_groundtruth.txt"

# Front-end (KLT)
use_klt: true
num_pts: 250
fast_threshold: 20
grid_x: 5
grid_y: 5
min_px_dist: 10
knn_ratio: 0.70
track_frequency: 15.0
downsample_cameras: false
num_opencv_threads: 4
histogram_method: "HISTOGRAM"

use_aruco: false
num_aruco: 1024
downsize_aruco: true

# Update noise / chi-squared multipliers
up_msckf_sigma_px: 1
up_msckf_chi2_multipler: 1
up_slam_sigma_px: 1
up_slam_chi2_multipler: 1
up_aruco_sigma_px: 1
up_aruco_chi2_multipler: 1

use_mask: false

relative_config_imu: "kalibr_imu_chain.yaml"
relative_config_imucam: "kalibr_imucam_chain.yaml"
